<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="icon" type="image/png" href="/face-attendance-system/assets/images/favicon.png">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class', // ✅ important for toggle
    }
  </script>

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet"/>
</head>

<body class="bg-gray-950 text-white dark:bg-white dark:text-black">

<!-- NAVBAR -->
<nav class="bg-black/70 backdrop-blur-lg p-4 flex justify-between items-center border-b border-gray-700">
  <div class="flex items-center space-x-2">
    <img src="../../../assets/images/logo.png" class="h-8 w-8">
    <h1 class="font-bold text-xl text-cyan-400">AI Attendance</h1>
  </div>

  <div class="space-x-6 hidden md:block">
    <a href="../../../index.html" class="hover:text-cyan-400">Home</a>
    <a href="../blog/blog.html" class="hover:text-cyan-400">Blog</a>
    <a href="../about/about.html" class="hover:text-cyan-400">About</a>
    <a href="../contact/contact.html" class="hover:text-cyan-400">Contact</a>
    <a href="../records/records.html" class="hover:text-cyan-400">Records</a>
  </div>
  <div class="space-x-4">
    <a href="../signin/signin.html" class="hover:text-cyan-400">Sign In</a>
    <a href="../signup/signup.html" class="px-4 py-2 bg-gradient-to-r from-cyan-500 to-purple-500 rounded-lg">Sign Up</a>
    <button id="themeToggle" class="px-3 py-1 bg-cyan-500 rounded">Toggle</button>
  </div>
</nav>

<!-- HERO -->
<section class="text-center py-14 bg-gradient-to-br from-gray-900 via-blue-900 to-purple-900">
  <h1 class="text-4xl font-bold text-cyan-400" data-aos="fade-up">Create Account</h1>
  <p class="text-gray-300" data-aos="fade-up">Join AI Attendance System</p>
</section>

<!-- FORM -->
<section class="max-w-md mx-auto bg-gray-900 p-8 rounded-xl shadow-lg mt-10 dark:bg-gray-200 dark:text-black" data-aos="zoom-in">

  <h2 class="text-2xl font-bold text-center text-purple-400 mb-6">Sign Up</h2>

  <div id="signupAlert" class="hidden p-3 mb-4 rounded"></div>

  <form id="signupForm">

    <input type="text" id="name" placeholder="Full Name"
      class="w-full mb-4 p-2 rounded bg-black border border-gray-700 focus:ring-2 focus:ring-cyan-400 dark:bg-white dark:text-black">

    <input type="email" id="email" placeholder="Email"
      class="w-full mb-4 p-2 rounded bg-black border border-gray-700 focus:ring-2 focus:ring-cyan-400 dark:bg-white dark:text-black">

    <input type="password" id="password" placeholder="Password"
      class="w-full mb-2 p-2 rounded bg-black border border-gray-700 focus:ring-2 focus:ring-cyan-400 dark:bg-white dark:text-black">

    <!-- Strength -->
    <div class="w-full bg-gray-700 h-2 rounded mb-4">
      <div id="strengthBar" class="h-2 rounded bg-red-500 w-0 transition-all"></div>
    </div>

    <div class="flex items-center mb-4">
      <input type="checkbox" id="terms" class="mr-2">
      <label>I agree to terms</label>
    </div>

    <button type="submit"
      class="w-full py-2 bg-gradient-to-r from-cyan-500 to-purple-500 rounded-lg hover:scale-105 transition">
      Sign Up
    </button>

  </form>

  <p class="mt-4 text-center">
    Already have account?
    <a href="../signin/signin.html" class="text-cyan-400">Sign In</a>
  </p>

</section>

<!-- FOOTER -->
<footer class="bg-black text-white text-center p-5 mt-10 border-t border-gray-700 dark:bg-black dark:text-white">
  <p>© 2026 AI Attendance System</p>
</footer>


<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>AOS.init();</script>

<script src="../../../src/pages/signup/signup.js"></script>

<!-- ✅ Theme Toggle Script -->
<script>
  const toggleBtn = document.getElementById("themeToggle");

  // Load saved theme
  if (localStorage.getItem("theme") === "dark") {
    document.documentElement.classList.add("dark");
  }

  toggleBtn.addEventListener("click", () => {
    document.documentElement.classList.toggle("dark");
    if (document.documentElement.classList.contains("dark")) {
      localStorage.setItem("theme", "dark");
    } else {
      localStorage.setItem("theme", "light");
    }
  });
</script>

</body>
</html>
