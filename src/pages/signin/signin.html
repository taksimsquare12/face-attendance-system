<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet"/>
</head>

<body class="bg-gray-950 text-white">

<!-- NAVBAR -->
<nav class="bg-black/70 backdrop-blur-lg p-4 flex justify-between items-center border-b border-gray-700">
  <div class="flex items-center space-x-2">
    <img src="../../../assets/images/logo.png" class="h-8 w-8">
    <h1 class="font-bold text-xl text-cyan-400">AI Attendance</h1>
  </div>

  <div class="space-x-6 hidden md:block">
    <a href="../../../index.html" class="hover:text-cyan-400">Home</a>
    <a href="../blog/blog.html" class="hover:text-cyan-400">Blog</a>
    <a href="../about/about.html" class="hover:text-cyan-400">About</a>
    <a href="../contact/contact.html" class="hover:text-cyan-400">Contact</a>
    <a href="src/pages/records/records.html" class="hover:text-cyan-400">Records</a>
  </div>
  <div class="space-x-4">
    <a href="../signin/signin.html" class="hover:text-cyan-400">Sign In</a>
    <a href="../signup/signup.html" class="px-4 py-2 bg-gradient-to-r from-cyan-500 to-purple-500 rounded-lg">Sign Up</a>
  </div>
</nav>

<!-- HERO -->
<section class="text-center py-14 bg-gradient-to-br from-gray-900 via-blue-900 to-purple-900">
  <h1 class="text-4xl font-bold text-cyan-400" data-aos="fade-up">Welcome Back</h1>
  <p class="text-gray-300" data-aos="fade-up">Login to AI Attendance System</p>
</section>

<!-- FORM -->
<section class="max-w-md mx-auto bg-gray-900 p-8 rounded-xl shadow-lg mt-10" data-aos="zoom-in">

  <h2 class="text-2xl font-bold text-center text-purple-400 mb-6">Sign In</h2>

  <div id="loginMessage" class="hidden p-3 mb-4 rounded"></div>

  <form id="loginForm">

    <input type="email" id="email" placeholder="Email"
      class="w-full mb-4 p-2 rounded bg-black border border-gray-700 focus:ring-2 focus:ring-cyan-400">

    <div class="relative mb-4">
      <input type="password" id="password" placeholder="Password"
        class="w-full p-2 rounded bg-black border border-gray-700 focus:ring-2 focus:ring-cyan-400">
      <button type="button" id="togglePassword"
        class="absolute right-2 top-2 text-sm text-gray-400">Show</button>
    </div>

    <div class="flex items-center mb-4">
      <input type="checkbox" id="remember" class="mr-2">
      <label>Remember Me</label>
    </div>

    <button type="submit"
      class="w-full py-2 bg-gradient-to-r from-cyan-500 to-purple-500 rounded-lg hover:scale-105 transition">
      Login
    </button>

  </form>

  <p class="mt-4 text-center">
    Don't have account?
    <a href="../signup/signup.html" class="text-cyan-400">Sign Up</a>
  </p>

</section>

<footer class="text-center p-5 mt-10 border-t border-gray-700">
  <p>© 2026 AI Attendance System</p>
</footer>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>AOS.init();</script>

<script src="../../../src/pages/script/signin.js"></script>

</body>
</html>
