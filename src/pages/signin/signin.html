<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.js"></script>
</head>
<body class="bg-white text-black transition-colors duration-300">

  <!-- Navbar -->
  <nav class="bg-black dark:bg-white p-4 text-white dark:text-black flex justify-between items-center">
    <div class="flex items-center space-x-2">
      <img src="../../../assets/images/logo.png" alt="Logo" class="h-8 w-8">
      <h1 class="font-bold text-xl">AI Face Attendance App</h1>
    </div>
    <div class="space-x-4">
      <a href="../../../index.html" class="hover:underline">Home</a>
      <a href="../about/about.html" class="hover:underline">About</a>
      <a href="../contact/contact.html" class="hover:underline">Contact</a>
      <a href="../blog/blog.html" class="hover:underline">Blog</a>
    </div>
    <div class="space-x-4 flex items-center">
      <a href="signin.html" class="hover:underline">Sign In</a>
      <a href="../signup/signup.html" class="hover:underline">Sign Up</a>
      <button id="theme-toggle" class="p-2 rounded border">Toggle Theme</button>
    </div>
  </nav>

  <!-- Sign In Form -->
  <section class="max-w-md mx-auto bg-white dark:bg-gray-800 p-8 shadow mt-10 rounded-lg">
    <h2 class="text-2xl font-bold mb-6 text-center">Sign In</h2>

    <!-- Alert Box -->
    <div id="loginMessage" class="hidden p-4 mb-4 text-sm rounded-lg" role="alert"></div>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required
             class="border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-black text-black dark:text-white p-2 w-full mb-4 rounded">
      
      <!-- Password with toggle -->
      <div class="relative mb-4">
        <input type="password" id="password" placeholder="Password" required
               class="border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-black text-black dark:text-white p-2 w-full rounded">
        <button type="button" id="togglePassword" class="absolute right-2 top-2 text-sm text-gray-500 dark:text-gray-400">Show</button>
      </div>

      <!-- Remember Me -->
      <div class="flex items-center mb-4">
        <input id="remember" type="checkbox" class="w-4 h-4 text-blue-600 border-gray-300 rounded">
        <label for="remember" class="ml-2 text-sm">Remember Me</label>
      </div>

      <button type="submit" class="w-full bg-black dark:bg-white text-white dark:text-black py-2 rounded">Login</button>
    </form>

    <!-- Social Login -->
    <div class="flex justify-center space-x-6 mt-6">
      <a href="#" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
        <img src="../../../assets/images/facebook.png" alt="Facebook" class="h-8 w-8">
      </a>
      <a href="#" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
        <img src="../../../assets/images/google.png" alt="Google" class="h-8 w-8">
      </a>
    </div>

    <!-- Sign Up Link -->
    <p class="mt-6 text-center">Don't have an account? 
      <a href="../signup/signup.html" class="text-blue-600 dark:text-blue-400 hover:underline">Sign Up</a>
    </p>
  </section>

  <!-- Footer -->
  <footer class="bg-black dark:bg-white text-white dark:text-black text-center p-4 mt-10">
    <p>&#169; 2026 Face Recognition System</p>
    <div class="flex justify-center space-x-4 mt-2">
      <a href="#" class="hover:underline">Facebook</a>
      <a href="#" class="hover:underline">Twitter</a>
      <a href="#" class="hover:underline">LinkedIn</a>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="../../../src/pages/script/toggle.js" defer></script>
  <script src="../../../src/pages/script/signin.js" defer></script>

  <!-- Inline Password Toggle -->
  <script>
    const passwordInput = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");

    togglePassword.addEventListener("click", () => {
      const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);
      togglePassword.textContent = type === "password" ? "Show" : "Hide";
    });
  </script>
</body>
</html>
