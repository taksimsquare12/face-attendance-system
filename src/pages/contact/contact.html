<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.js"></script>
</head>
<body class="bg-white text-black transition-colors duration-300">

  <!-- Navbar -->
  <nav class="bg-black dark:bg-white p-4 text-white dark:text-black flex justify-between items-center">
    <div class="flex items-center space-x-2">
      <img src="../../../assets/images/logo.png" alt="Logo" class="h-8 w-8">
      <h1 class="font-bold text-xl">AI Face Attendance App</h1>
    </div>
    <div class="space-x-4">
      <a href="../../../index.html" class="hover:underline">Home</a>
      <a href="../about/about.html" class="hover:underline">About</a>
      <a href="contact.html" class="hover:underline">Contact</a>
      <a href="../blog/blog.html" class="hover:underline">Blog</a>
    </div>
    <div class="space-x-4 flex items-center">
      <a href="../signin/signin.html" class="hover:underline">Sign In</a>
      <a href="../signup/signup.html" class="hover:underline">Sign Up</a>
      <button id="theme-toggle" class="p-2 rounded border">Toggle Theme</button>
    </div>
  </nav>

  <!-- Contact Section -->
  <section class="max-w-xl mx-auto bg-white dark:bg-gray-800 p-8 shadow mt-10 rounded-lg">
    <h2 class="text-2xl font-bold mb-6 text-center">Contact Us</h2>
    
    <!-- Flowbite Alert -->
    <div id="formAlert" class="hidden p-4 mb-4 text-sm rounded-lg" role="alert"></div>

    <!-- Formspree Form -->
    <form id="contactForm" action="https://formspree.io/f/mlgporvy" method="POST">
      <div class="mb-4">
        <label class="block mb-2">Your Name</label>
        <input type="text" name="name" required
               class="border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-black text-black dark:text-white p-2 w-full rounded">
      </div>
      <div class="mb-4">
        <label class="block mb-2">Your Email</label>
        <input type="email" name="email" required
               class="border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-black text-black dark:text-white p-2 w-full rounded">
      </div>
      <div class="mb-4">
        <label class="block mb-2">Message</label>
        <textarea name="message" required
                  class="border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-black text-black dark:text-white p-2 w-full rounded"></textarea>
      </div>
      <button type="submit" class="w-full bg-black dark:bg-white text-white dark:text-black py-2 rounded">Send Message</button>
    </form>

    <!-- Modal Trigger -->
    <div class="text-center mt-6">
      <button data-modal-target="contactModal" data-modal-toggle="contactModal" class="px-4 py-2 bg-zinc-600 text-white rounded">More Info</button>
    </div>
  </section>

  <!-- Flowbite Modal -->
  <div id="contactModal" tabindex="-1" aria-hidden="true" class="hidden fixed top-0 left-0 right-0 z-50 w-full p-4 overflow-x-hidden overflow-y-auto h-[calc(100%-1rem)] max-h-full">
    <div class="relative w-full max-w-md max-h-full">
      <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <h3 class="text-lg font-bold mb-4">Contact Information</h3>
        <p>Email: support@attendanceapp.com</p>
        <p>Phone: +92-300-1234567</p>
        <button data-modal-hide="contactModal" class="mt-4 px-4 py-2 bg-black dark:bg-white text-white dark:text-black rounded">Close</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-black dark:bg-white text-white dark:text-black text-center p-4 mt-10">
    <p>&#169; 2026 Face Recognition System</p>
    <div class="flex justify-center space-x-4 mt-2">
      <a href="#" class="hover:underline">Facebook</a>
      <a href="#" class="hover:underline">Twitter</a>
      <a href="#" class="hover:underline">LinkedIn</a>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="../../../src/pages/script/toggle.js" defer></script>
  <script src="../../../src/pages/script/contact.js" defer></script>
</body>
</html>
